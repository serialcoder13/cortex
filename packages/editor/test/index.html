<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CortexEditor Test Harness</title>
  <style>
    :root {
      --text-primary: #1a1a1a;
      --text-secondary: #4a4a4a;
      --text-muted: #999;
      --bg-primary: #fff;
      --bg-secondary: #f5f5f5;
      --bg-tertiary: #eee;
      --bg-hover: #f0f0f0;
      --bg-active: #e8e8e8;
      --accent: #2563eb;
      --accent-muted: #93b5fd;
      --accent-hover: #1d4ed8;
      --border-primary: #e5e5e5;
      --border-secondary: #d4d4d4;
      --shadow: rgba(0,0,0,0.1);
      --success: #22c55e;
      --warning: #eab308;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: var(--text-primary);
      background: var(--bg-primary);
    }
    #app {
      max-width: 720px;
      margin: 40px auto;
      padding: 0 24px;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="./main.tsx"></script>
</body>
</html>
